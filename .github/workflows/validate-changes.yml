name: Validate Changes

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate main.js syntax
        run: node --check main.js

      - name: Validate bootstrap.js syntax
        run: node --check bootstrap.js

      - name: Validate essential files
        run: |
          test -f index.html
          test -f styles.css
