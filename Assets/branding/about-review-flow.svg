<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">MedBank review flow illustration</title>
  <desc id="desc">A visual flow from question to explanation to next focused study step.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#f6f1ea"/></linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#102a43" flood-opacity="0.13"/></filter>
  </defs>
  <rect width="720" height="520" rx="44" fill="url(#bg)"/>
  <circle cx="124" cy="104" r="76" fill="#177e89" opacity="0.12"/>
  <circle cx="610" cy="398" r="90" fill="#f4a259" opacity="0.16"/>
  <g filter="url(#shadow)" font-family="Inter, Arial">
    <rect x="82" y="158" width="168" height="198" rx="28" fill="#ffffff" stroke="#e2eeee"/>
    <text x="118" y="206" fill="#102a43" font-size="18" font-weight="800">Question</text>
    <rect x="118" y="236" width="94" height="10" rx="5" fill="#b9d9d6"/>
    <rect x="118" y="266" width="106" height="10" rx="5" fill="#b9d9d6"/>
    <rect x="118" y="296" width="72" height="10" rx="5" fill="#177e89"/>
    <path d="M266 257h72" stroke="#177e89" stroke-width="5" stroke-linecap="round"/>
    <path d="M324 241l17 16-17 16" fill="none" stroke="#177e89" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="354" y="118" width="210" height="278" rx="32" fill="#102a43"/>
    <text x="396" y="174" fill="#ffffff" font-size="20" font-weight="800">Explanation</text>
    <rect x="396" y="208" width="112" height="10" rx="5" fill="#64d2c8"/>
    <rect x="396" y="236" width="130" height="10" rx="5" fill="#ffffff" opacity="0.2"/>
    <rect x="396" y="264" width="92" height="10" rx="5" fill="#ffffff" opacity="0.2"/>
    <rect x="396" y="308" width="92" height="34" rx="17" fill="#f4a259"/>
    <text x="442" y="330" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">Review</text>
    <path d="M560 257h52" stroke="#f4a259" stroke-width="5" stroke-linecap="round"/>
    <path d="M600 241l17 16-17 16" fill="none" stroke="#f4a259" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="598" y="178" width="72" height="158" rx="24" fill="#ffffff" stroke="#e2eeee"/>
    <circle cx="634" cy="220" r="20" fill="#177e89"/>
    <path d="M625 220l6 6 13-17" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="620" y="260" width="28" height="8" rx="4" fill="#b9d9d6"/>
    <rect x="614" y="282" width="40" height="8" rx="4" fill="#b9d9d6"/>
  </g>
</svg>
