<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">MedBank progress analytics illustration</title>
  <desc id="desc">A clean analytics card showing topic progress and accuracy improvement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffaf4"/><stop offset="1" stop-color="#eff8f7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#102a43" flood-opacity="0.13"/></filter>
  </defs>
  <rect width="720" height="520" rx="44" fill="url(#bg)"/>
  <path d="M80 384C178 256 276 438 404 244s196-88 248-166" fill="none" stroke="#177e89" stroke-width="6" stroke-linecap="round" opacity="0.16"/>
  <g filter="url(#shadow)">
    <rect x="96" y="86" width="528" height="348" rx="36" fill="#ffffff" stroke="#e1eeee"/>
    <text x="138" y="144" fill="#102a43" font-family="Inter, Arial" font-size="24" font-weight="800">Progress snapshot</text>
    <text x="138" y="174" fill="#637782" font-family="Inter, Arial" font-size="15">Weak topics become visible patterns.</text>
    <g transform="translate(138 224)">
      <rect width="84" height="138" rx="18" fill="#edf7f6"/>
      <rect y="62" width="84" height="76" rx="18" fill="#177e89"/>
      <text x="42" y="164" text-anchor="middle" fill="#637782" font-family="Inter, Arial" font-size="13">CVS</text>
    </g>
    <g transform="translate(248 196)">
      <rect width="84" height="166" rx="18" fill="#edf7f6"/>
      <rect y="36" width="84" height="130" rx="18" fill="#f4a259"/>
      <text x="42" y="192" text-anchor="middle" fill="#637782" font-family="Inter, Arial" font-size="13">Resp</text>
    </g>
    <g transform="translate(358 246)">
      <rect width="84" height="116" rx="18" fill="#edf7f6"/>
      <rect y="78" width="84" height="38" rx="18" fill="#177e89" opacity="0.82"/>
      <text x="42" y="142" text-anchor="middle" fill="#637782" font-family="Inter, Arial" font-size="13">Renal</text>
    </g>
    <g transform="translate(468 174)">
      <rect width="84" height="188" rx="18" fill="#edf7f6"/>
      <rect y="26" width="84" height="162" rx="18" fill="#177e89"/>
      <text x="42" y="214" text-anchor="middle" fill="#637782" font-family="Inter, Arial" font-size="13">Neuro</text>
    </g>
    <circle cx="530" cy="136" r="44" fill="#102a43"/>
    <text x="530" y="132" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial" font-size="18" font-weight="800">82%</text>
    <text x="530" y="152" text-anchor="middle" fill="#b7f2ec" font-family="Inter, Arial" font-size="11">accuracy</text>
  </g>
